<app-header [pageTitle]="pageTitle"></app-header>

<div class="container-fluid">

  
  <div class="d-md-none p-2">
    <button
      class="btn btn-dark"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#sidebarMenu">
      ☰ Dashboard Menu
    </button>
  </div>

  <div class="row">

   
    <div class="col-md-3 col-lg-2">

      <div
        id="sidebarMenu"
        class="collapse d-md-block bg-dark text-white min-vh-100 p-3">

        <!-- <h4 class="mb-4">Dashboard</h4> -->

        <ul class="nav flex-column">

          <li class="nav-item mb-2">
            <a class="nav-link text-white" routerLink="/dashboard/home">
              Home
            </a>
          </li>

          <li class="nav-item mb-2">
            <a class="nav-link text-white" routerLink="/dashboard/profile">
              Profile
            </a>
          </li>

          <li class="nav-item mb-2">
            <a class="nav-link text-white" routerLink="/dashboard/reports">
              Reports
            </a>
          </li>

          <li class="nav-item mb-2">
            <a class="nav-link text-white" routerLink="/dashboard/settings">
              Settings
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-danger" routerLink="/login">
              Logout
            </a>
          </li>

        </ul>

      </div>

    </div>

   

    <div class="col-md-9 col-lg-10 p-4">

      <router-outlet></router-outlet>

    </div>

  </div>

</div>

<app-footer></app-footer>
